<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Viral Moments Catalog</title>
    <meta
      name="description"
      content="A searchable catalog of viral internet moments and memes."
    />
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="scripts.js"></script>
  </head>
  <body>
    <header class="page-header">
      <p class="eyebrow">Internet Culture Archive</p>
      <h1>Viral Moments And Memes Catalog</h1>
      <p class="subtitle">
        Explore iconic challenges, formats, phrases, and trends across
        platforms.
      </p>
    </header>

    <main class="layout">
      <aside class="controls">
        <h2>Browse</h2>

        <label for="searchInput">Search</label>
        <input
          id="searchInput"
          type="text"
          placeholder="Name, type, platform..."
          autocomplete="off"
        />

        <label for="platformFilter">Platform</label>
        <select id="platformFilter">
          <option value="all">All platforms</option>
          <option value="facebook">Facebook</option>
          <option value="instagram">Instagram</option>
          <option value="youtube">Youtube</option>
        </select>

        <label for="categoryFilter">Category</label>
        <select id="categoryFilter">
          <option value="all">All categories</option>
          <option value="humor">Humor</option>
          <option value="dance">Dance</option>
          <option value="social">Social</option>
          <option value="gaming">Gaming</option>
        </select>

        <label for="sortBy">Sort By</label>
        <select id="sortBy">
          <option value="year-desc">Year (Newest First)</option>
          <option value="year-asc">Year (Oldest First)</option>
          <option value="name-asc">Name (A-Z)</option>
        </select>

      

        <button id="clearFilters" type="button">Clear Filters</button>
      </aside>

      <section class="results">
        <div class="results-head">
          <p id="resultCount" aria-live="polite"></p>
        </div>
        <div id="catalogGrid" class="catalog-grid" aria-live="polite"></div>
      </section>
    </main>
  </body>
</html>
